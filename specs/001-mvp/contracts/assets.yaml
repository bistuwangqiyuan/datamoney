openapi: 3.0.3
info:
  title: 比特币交易平台 - 资产管理 API
  version: 1.0.0
  description: |
    用户资产查询 API，包括 BTC 和 USDT 余额查询、总资产估值等。
    
    **资产类型**:
    - `BTC`: 比特币
    - `USDT`: Tether（稳定币）
    
    **余额类型**:
    - `available`: 可用余额（可用于下单）
    - `frozen`: 冻结余额（挂单中锁定）

servers:
  - url: https://your-project.supabase.co/functions/v1
    description: Supabase Edge Functions

security:
  - BearerAuth: []

tags:
  - name: Assets
    description: 资产管理操作

paths:
  /get-user-assets:
    get:
      tags:
        - Assets
      summary: 查询用户资产
      description: |
        查询当前用户的所有资产余额（BTC 和 USDT）。
      operationId: getUserAssets
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  total_value_usdt:
                    type: number
                    format: decimal
                    example: 62000.50
                    description: 总资产估值（以 USDT 计价）
                  btc_price:
                    type: number
                    format: decimal
                    example: 42000.50
                    description: 当前 BTC 价格（用于计算总资产）
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /get-asset-history:
    get:
      tags:
        - Assets
      summary: 查询资产变动历史
      description: |
        查询用户资产的历史变动记录（可选功能，MVP 可不实现）。
      operationId: getAssetHistory
      parameters:
        - name: asset_type
          in: query
          description: 资产类型过滤
          required: false
          schema:
            type: string
            enum: [BTC, USDT]
          example: BTC
        - name: page
          in: query
          description: 页码（从 1 开始）
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssetHistory'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Asset:
      type: object
      properties:
        asset_type:
          type: string
          enum: [BTC, USDT]
          example: BTC
          description: 资产类型
        available:
          type: number
          format: decimal
          example: 0.85000000
          description: 可用余额
        frozen:
          type: number
          format: decimal
          example: 0.15000000
          description: 冻结余额（挂单中）
        total:
          type: number
          format: decimal
          example: 1.00000000
          description: 总余额（可用 + 冻结）
        value_usdt:
          type: number
          format: decimal
          example: 42000.50
          description: 资产估值（以 USDT 计价）
        updated_at:
          type: string
          format: date-time
          example: '2025-10-14T11:45:00Z'
          description: 最后更新时间

    AssetHistory:
      type: object
      description: 资产变动记录（可选功能）
      properties:
        id:
          type: string
          format: uuid
          example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
          description: 记录 ID
        asset_type:
          type: string
          enum: [BTC, USDT]
          example: BTC
          description: 资产类型
        change_type:
          type: string
          enum: [DEPOSIT, WITHDRAW, TRADE, FREEZE, UNFREEZE]
          example: TRADE
          description: 变动类型
        amount:
          type: number
          format: decimal
          example: -0.05
          description: 变动金额（正数为增加，负数为减少）
        balance_after:
          type: number
          format: decimal
          example: 0.95
          description: 变动后余额
        related_order_id:
          type: string
          format: uuid
          example: 'c3d4e5f6-a7b8-9012-cdef-123456789012'
          description: 关联订单 ID（如果有）
          nullable: true
        created_at:
          type: string
          format: date-time
          example: '2025-10-14T12:05:00Z'
          description: 变动时间

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        total_pages:
          type: integer
          example: 5
        total_count:
          type: integer
          example: 98
        page_size:
          type: integer
          example: 20

    Error:
      type: object
      properties:
        error:
          type: string
          example: 'Unauthorized'
          description: 错误描述信息
        code:
          type: string
          example: 'unauthorized'
          description: 错误代码
        status:
          type: integer
          example: 401
          description: HTTP 状态码

