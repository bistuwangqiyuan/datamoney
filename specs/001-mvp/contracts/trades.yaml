openapi: 3.0.3
info:
  title: 比特币交易平台 - 成交记录 API
  version: 1.0.0
  description: |
    成交记录查询 API，用户可查询自己的成交历史和市场公共成交记录。

servers:
  - url: https://your-project.supabase.co/functions/v1
    description: Supabase Edge Functions

security:
  - BearerAuth: []

tags:
  - name: Trades
    description: 成交记录查询

paths:
  /get-my-trades:
    get:
      tags:
        - Trades
      summary: 查询我的成交记录
      description: |
        查询当前用户的所有成交记录（作为买方或卖方）。
      operationId: getMyTrades
      parameters:
        - name: page
          in: query
          description: 页码（从 1 开始）
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: start_date
          in: query
          description: 起始时间（ISO 8601 格式）
          required: false
          schema:
            type: string
            format: date-time
          example: '2025-10-01T00:00:00Z'
        - name: end_date
          in: query
          description: 结束时间（ISO 8601 格式）
          required: false
          schema:
            type: string
            format: date-time
          example: '2025-10-14T23:59:59Z'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  trades:
                    type: array
                    items:
                      $ref: '#/components/schemas/Trade'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /get-market-trades:
    get:
      tags:
        - Trades
      summary: 查询市场成交记录
      description: |
        查询市场公共成交记录（最近的成交流）。
        
        **注意**: 此接口返回所有用户的成交记录，但不包含用户 ID。
      operationId: getMarketTrades
      parameters:
        - name: limit
          in: query
          description: 返回数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  trades:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublicTrade'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Trade:
      type: object
      description: 用户私有成交记录（包含完整信息）
      properties:
        id:
          type: string
          format: uuid
          example: 'd4e5f6a7-b8c9-0123-def1-234567890123'
          description: 成交 ID
        buy_order_id:
          type: string
          format: uuid
          example: 'c3d4e5f6-a7b8-9012-cdef-123456789012'
          description: 买单 ID
        sell_order_id:
          type: string
          format: uuid
          example: 'e5f6a7b8-c9d0-1234-ef12-345678901234'
          description: 卖单 ID
        price:
          type: number
          format: decimal
          example: 42000.50
          description: 成交价格
        quantity:
          type: number
          format: decimal
          example: 0.05
          description: 成交数量
        side:
          type: string
          enum: [BUY, SELL]
          example: BUY
          description: 当前用户在此成交中的角色（买方/卖方）
        created_at:
          type: string
          format: date-time
          example: '2025-10-14T12:05:00Z'
          description: 成交时间

    PublicTrade:
      type: object
      description: 市场公共成交记录（不包含用户 ID 和订单 ID）
      properties:
        id:
          type: string
          format: uuid
          example: 'd4e5f6a7-b8c9-0123-def1-234567890123'
          description: 成交 ID
        price:
          type: number
          format: decimal
          example: 42000.50
          description: 成交价格
        quantity:
          type: number
          format: decimal
          example: 0.05
          description: 成交数量
        created_at:
          type: string
          format: date-time
          example: '2025-10-14T12:05:00Z'
          description: 成交时间

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        total_pages:
          type: integer
          example: 5
        total_count:
          type: integer
          example: 98
        page_size:
          type: integer
          example: 20

    Error:
      type: object
      properties:
        error:
          type: string
          example: 'Unauthorized'
          description: 错误描述信息
        code:
          type: string
          example: 'unauthorized'
          description: 错误代码
        status:
          type: integer
          example: 401
          description: HTTP 状态码

