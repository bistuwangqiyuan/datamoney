[build]
  command = "pnpm build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"

# Database: Netlify DB (built-in Neon Postgres). Once the database is connected
# from the Netlify UI (Site → Configuration → Database), the platform injects
# NETLIFY_DATABASE_URL automatically at build/runtime; no manual config needed.
# Auth still runs on Supabase, configured via NEXT_PUBLIC_SUPABASE_URL +
# NEXT_PUBLIC_SUPABASE_ANON_KEY in the Netlify UI.

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

